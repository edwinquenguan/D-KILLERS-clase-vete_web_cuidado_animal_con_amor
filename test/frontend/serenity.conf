webdriver {
  driver = chrome
  base.url = "http://localhost"
  autodownload = true
}

headless.mode = true

chrome.switches = """--start-maximized;--headless=new;--no-sandbox;--disable-dev-shm-usage;--window-size=1280,1024"""

serenity {
  project.name = "Veterinaria E2E (Screenplay)"
  take.screenshots = FOR_FAILURES
}
