services:
  db:
    image: mysql:8.0
    container_name: vet_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-DB_CUIDADO_ANIMAL}
      MYSQL_USER: ${DB_USER:-vetuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-vetpass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vet_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:5
    container_name: vet_phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    ports:
      - "8081:80"

  backend:
    # Apunta al código del API FastAPI (carpeta hermana de este proyecto)
    build:
      context: ../vete_api_cuidado_animal_con_amor
      dockerfile: Dockerfile
    container_name: vet_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-DB_CUIDADO_ANIMAL}
      DB_USER: ${DB_USER:-vetuser}
      DB_PASSWORD: ${DB_PASSWORD:-vetpass}
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: production
      ACCESS_TOKEN_SECRET_KEY: ${ACCESS_TOKEN_SECRET_KEY:-cambia_esta_clave_de_acceso_super_secreta}
      REFRESH_TOKEN_SECRET_KEY: ${REFRESH_TOKEN_SECRET_KEY:-cambia_esta_clave_de_refresh_super_secreta}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE: ${ACCESS_TOKEN_EXPIRE:-60}
      REFRESH_TOKEN_EXPIRE: ${REFRESH_TOKEN_EXPIRE:-10080}
      MAIL_USERNAME: ${MAIL_USERNAME:-noreply@vet.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@vet.com}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./src/FrontEnd
    container_name: vet_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
